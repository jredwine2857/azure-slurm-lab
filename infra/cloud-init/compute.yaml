#cloud-config
hostname: compute
fqdn: compute
manage_etc_hosts: false

package_update: true
packages:
  - munge
  - slurmd
  - python3
  - python3-pip

write_files:
  # No owner/permissions here: the munge user doesn't exist until the
  # `munge` package installs later in boot, and cc_write_files aborts the
  # whole module (silently dropping slurm.conf/hosts too) if chown fails
  # on a nonexistent user. Ownership/mode are fixed up in runcmd instead.
  - path: /etc/munge/munge.key
    encoding: b64
    content: __MUNGE_KEY__

  - path: /etc/hosts
    append: true
    content: |
      10.0.0.4 controller
      10.0.0.5 compute

  - path: /etc/slurm/slurm.conf
    owner: root:root
    permissions: '0644'
    content: |
      ClusterName=slurmlab
      SlurmctldHost=controller(10.0.0.4)
      MpiDefault=none
      ProctrackType=proctrack/linuxproc
      ReturnToService=1
      SlurmctldPidFile=/var/run/slurmctld.pid
      SlurmctldPort=6817
      SlurmdPidFile=/var/run/slurmd.pid
      SlurmdPort=6818
      SlurmdSpoolDir=/var/spool/slurmd
      SlurmUser=slurm
      StateSaveLocation=/var/spool/slurmctld
      SwitchType=switch/none
      TaskPlugin=task/affinity
      InactiveLimit=0
      KillWait=30
      MinJobAge=300
      SlurmctldTimeout=120
      SlurmdTimeout=300
      Waittime=0
      SchedulerType=sched/backfill
      SelectType=select/cons_tres
      SelectTypeParameters=CR_Core
      AccountingStorageType=accounting_storage/none
      JobCompType=jobcomp/none
      JobAcctGatherType=jobacct_gather/none
      SlurmctldLogFile=/var/log/slurm/slurmctld.log
      SlurmdLogFile=/var/log/slurm/slurmd.log
      NodeName=controller NodeAddr=10.0.0.4 CPUs=2 State=UNKNOWN
      NodeName=compute NodeAddr=10.0.0.5 CPUs=2 State=UNKNOWN
      PartitionName=debug Nodes=controller,compute Default=YES MaxTime=INFINITE State=UP

runcmd:
  - mkdir -p /var/spool/slurmd
  - chown munge:munge /etc/munge/munge.key
  - chmod 0400 /etc/munge/munge.key
  - systemctl enable munge
  - systemctl restart munge
  - pip3 install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu
  - systemctl enable slurmd
  - systemctl restart slurmd
