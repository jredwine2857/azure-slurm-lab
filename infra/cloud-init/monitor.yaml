#cloud-config
hostname: monitor
fqdn: monitor
manage_etc_hosts: false

package_update: true
packages:
  - prometheus
  - prometheus-node-exporter

write_files:
  - path: /etc/hosts
    append: true
    content: |
      10.0.0.4 controller
      10.0.0.5 compute
      10.0.0.6 monitor

  - path: /etc/prometheus/prometheus.yml
    owner: root:root
    permissions: '0644'
    content: |
      global:
        scrape_interval: 15s

      scrape_configs:
        - job_name: 'prometheus'
          static_configs:
            - targets: ['localhost:9090']

        - job_name: 'node_exporter'
          static_configs:
            - targets: ['10.0.0.4:9100']
              labels:
                node: controller
            - targets: ['10.0.0.5:9100']
              labels:
                node: compute
            - targets: ['10.0.0.6:9100']
              labels:
                node: monitor

  # Grafana isn't installed yet at write_files time (its apt repo gets added
  # in runcmd, after packages install) — write_files creates the missing
  # parent directories itself, and the grafana package install afterward
  # doesn't touch/clobber unrelated files already sitting in them.
  - path: /etc/grafana/provisioning/datasources/prometheus.yml
    owner: root:root
    permissions: '0644'
    content: |
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://localhost:9090
          isDefault: true
          editable: true

runcmd:
  # Grafana isn't in default Ubuntu repos. Fetching the key/repo here in
  # runcmd (rather than cloud-init's apt.sources directive) keeps it
  # debuggable via `az vm run-command` the same way as every other step in
  # this project, instead of failing silently earlier in boot.
  - curl -fsSL https://apt.grafana.com/gpg.key | gpg --dearmor -o /usr/share/keyrings/grafana.gpg
  - echo "deb [signed-by=/usr/share/keyrings/grafana.gpg] https://apt.grafana.com stable main" > /etc/apt/sources.list.d/grafana.list
  - apt-get update
  - apt-get install -y grafana
  - systemctl enable prometheus
  - systemctl restart prometheus
  - systemctl enable prometheus-node-exporter
  - systemctl restart prometheus-node-exporter
  - systemctl enable grafana-server
  - systemctl restart grafana-server
